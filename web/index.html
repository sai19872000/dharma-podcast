<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dharma — Two traditions. One conversation.</title>
  <meta name="description" content="This is a podcast that holds two traditions in the same room and lets them talk to each other without flattening either one.">
  <meta property="og:title" content="Dharma — Two traditions. One conversation.">
  <meta property="og:description" content="East contemplative lineages and modern consciousness science, in dialogue. Five to eight minutes. One concept.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://dharma.saiteja.ai">
  <link rel="alternate" type="application/rss+xml" title="Dharma Podcast" href="/feed.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@200;300;400&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* page-level layout (index only) */
    .page-wrap {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .footer-wrap {
      margin-top: auto;
    }
  </style>
</head>
<body>
<div class="page-wrap">

  <!-- ─── site header ─────────────────────────────────────────────── -->
  <header class="site-header" role="banner">
    <div class="mark-row">
      <!-- AuraMark — breathing ring -->
      <div class="aura-mark" aria-hidden="true" title="Sai Ram Labs — quietly forged">
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none"
             xmlns="http://www.w3.org/2000/svg">
          <circle class="aura-ring" cx="22" cy="22" r="18"
                  stroke="#8AB6FF" stroke-width="0.75" fill="none"/>
          <circle class="aura-ring" cx="22" cy="22" r="13"
                  stroke="#8AB6FF" stroke-width="0.4" fill="none" opacity="0.5"/>
          <circle class="aura-core" cx="22" cy="22" r="5"
                  fill="#8AB6FF" opacity="0.18"/>
        </svg>
      </div>
    </div>

    <h1 class="show-name">Dharma</h1>
    <p class="show-tagline">Two traditions. One conversation.</p>
    <p class="show-mission">
      This is a podcast that holds two traditions in the same room and lets
      them talk to each other without flattening either one.
    </p>
  </header>

  <!-- ─── episodes ────────────────────────────────────────────────── -->
  <main class="episodes-section" role="main" aria-label="Episodes">
    <p class="episodes-heading">Episodes</p>

    <div class="episode-grid" role="list">
      <!-- {EPISODES_GRID} -->
      <!-- Worker replaces the marker above with rendered episode cards.
           Each card follows this shape:

      <a class="episode-card" href="/episodes/NNN" role="listitem"
         aria-label="Episode NNN: {title}">
        <div class="episode-card-header">
          <span class="episode-number">EP {NNN}</span>
          <span class="episode-meta">
            <span>{PUBLISH_DATE}</span>
            <span>{DURATION}</span>
          </span>
        </div>
        <h2 class="episode-title">{TITLE}</h2>
        <p class="episode-concept">
          <span class="sanskrit">{CONCEPT_SANSKRIT}</span>
          <span class="sep">·</span>
          {CONCEPT_ENGLISH}
        </p>
      </a>

      When no episodes are published yet:
      -->
      <div class="episodes-empty" role="listitem" aria-live="polite">
        <em>first episode forthcoming</em>
      </div>
    </div>
  </main>

  <!-- ─── footer ──────────────────────────────────────────────────── -->
  <div class="footer-wrap">
    <footer class="aura-credit" role="contentinfo">
      <div class="aura-credit-left">
        <!-- AuraCredit mark -->
        <svg class="aura-credit-mark" viewBox="0 0 18 18" fill="none"
             xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="9" cy="9" r="7.5" stroke="#8AB6FF" stroke-width="0.6" fill="none"/>
          <circle cx="9" cy="9" r="4"   stroke="#8AB6FF" stroke-width="0.4" fill="none" opacity="0.5"/>
        </svg>
        <span class="org">Sai Ram Labs</span>
      </div>
      <div class="aura-credit-right">
        <a href="https://saiteja.ai" rel="noopener noreferrer">saiteja.ai</a>
        <span aria-hidden="true">·</span>
        <!-- soul.md anchor — canonical show mind document -->
        <a href="https://github.com/sai19872000/dharma-podcast/blob/main/soul.md"
           rel="noopener noreferrer" title="The show's foundational worldview document">soul.md</a>
        <span aria-hidden="true">·</span>
        <a href="/feed.xml" type="application/rss+xml">RSS</a>
      </div>
    </footer>
  </div>

</div>

<script>
  /* printAuraSignature — aura-boot inheritance hook */
  (function printAuraSignature() {
    if (typeof console !== 'undefined' && console.log) {
      console.log('\u25D0 quietly forged at saiteja.ai');
    }
  })();
</script>
</body>
</html>
