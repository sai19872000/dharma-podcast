name = "dharma-podcast-rss"
compatibility_date = "2026-04-01"
main = "./src/worker.js"

[assets]
binding = "ASSETS"
directory = "../web"
not_found_handling = "404-page"

[[r2_buckets]]
binding = "AUDIO"
bucket_name = "dharma-podcast-audio"

[[routes]]
pattern = "dharma.saiteja.ai/*"
zone_name = "saiteja.ai"
